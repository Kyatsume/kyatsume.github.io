<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple M3U8 Player</title>
    <!-- HLS.js for M3U8 streaming -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@0.14.17/dist/hls.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .player-container {
            width: 100%;
            max-width: 900px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        video {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            cursor: pointer;
        }

        /* Custom Controls */
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 16px 14px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .video-wrapper:hover .controls,
        .video-wrapper.paused .controls {
            opacity: 1;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .controls button {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: 0.2s;
            min-width: 36px;
        }

        .controls button:hover {
            background: rgba(255,255,255,0.1);
        }

        .progress-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 4px;
            background: #555;
            border-radius: 2px;
            outline: none;
            transition: 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #e50914;
            cursor: pointer;
            border: 2px solid #fff;
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #e50914;
            cursor: pointer;
            border: 2px solid #fff;
        }

        .time {
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            min-width: 90px;
            letter-spacing: 0.3px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-control input[type="range"] {
            width: 60px;
        }

        /* Loading indicator */
        .loading {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 8px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid #e50914;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Input section */
        .input-section {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .input-section input {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #222;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .input-section input:focus {
            border-color: #e50914;
        }

        .input-section input::placeholder {
            color: #666;
        }

        .input-section button {
            padding: 10px 24px;
            border-radius: 6px;
            border: none;
            background: #e50914;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .input-section button:hover {
            background: #f6121d;
        }

        .presets {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .presets button {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #333;
            background: transparent;
            color: #aaa;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .presets button:hover {
            background: #333;
            color: #fff;
            border-color: #e50914;
        }

        .status {
            margin-top: 10px;
            color: #888;
            font-size: 13px;
            text-align: center;
        }

        .status span {
            color: #e50914;
        }

        @media (max-width: 600px) {
            .controls-row {
                flex-wrap: wrap;
                gap: 8px;
            }
            .volume-control input[type="range"] {
                width: 40px;
            }
            .time {
                font-size: 12px;
                min-width: 70px;
            }
            .input-section input {
                min-width: 150px;
            }
        }
    </style>
</head>
<body>

<div class="player-container">
    <!-- Video Player -->
    <div class="video-wrapper" id="wrapper">
        <video id="video" poster="https://via.placeholder.com/1280x720/1a1a1a/555555?text=M3U8+Player"></video>
        
        <div class="loading" id="loading">
            <span class="spinner"></span> Loading...
        </div>

        <div class="controls" id="controls">
            <div class="controls-row">
                <button id="playBtn">▶</button>
                
                <div class="progress-container">
                    <input type="range" id="progress" min="0" max="100" value="0" />
                    <span class="time" id="timeDisplay">0:00 / 0:00</span>
                </div>

                <div class="volume-control">
                    <button id="muteBtn">🔊</button>
                    <input type="range" id="volume" min="0" max="1" step="0.05" value="1" />
                </div>

                <button id="fullscreenBtn">⛶</button>
            </div>
        </div>
    </div>

    <!-- Input -->
    <div class="input-section">
        <input type="text" id="urlInput" placeholder="Enter M3U8 URL..." value="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" />
        <button id="loadBtn">Load</button>
    </div>

    <div class="presets">
        <button data-url="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8">Sample VOD</button>
        <button data-url="https://test-streams.mux.dev/index.m3u8">Live Test</button>
        <button data-url="https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8">Sintel</button>
    </div>

    <div class="status" id="status">Ready to play <span>⏺</span></div>
</div>

<script>
    (function() {
        const video = document.getElementById('video');
        const playBtn = document.getElementById('playBtn');
        const progress = document.getElementById('progress');
        const timeDisplay = document.getElementById('timeDisplay');
        const volume = document.getElementById('volume');
        const muteBtn = document.getElementById('muteBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const urlInput = document.getElementById('urlInput');
        const loadBtn = document.getElementById('loadBtn');
        const presets = document.querySelectorAll('.presets button');
        const loading = document.getElementById('loading');
        const status = document.getElementById('status');
        const wrapper = document.getElementById('wrapper');

        let hls = null;
        let isLive = false;

        // Format time
        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // Update progress
        function updateProgress() {
            if (video.duration && !isLive) {
                const percent = (video.currentTime / video.duration) * 100;
                progress.value = percent;
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            } else if (isLive && video.currentTime) {
                timeDisplay.textContent = `Live ${formatTime(video.currentTime)}`;
            }
        }

        // Set loading state
        function setLoading(state) {
            loading.classList.toggle('active', state);
            status.innerHTML = state ? 'Loading stream... <span>⏳</span>' : 'Ready <span>✅</span>';
        }

        // Toggle play/pause
        function togglePlay() {
            if (video.paused) {
                video.play();
                playBtn.textContent = '⏸';
                wrapper.classList.remove('paused');
            } else {
                video.pause();
                playBtn.textContent = '▶';
                wrapper.classList.add('paused');
            }
        }

        // Load M3U8 stream
        function loadStream(url) {
            if (!url || url.trim() === '') {
                alert('Please enter a valid M3U8 URL');
                return;
            }

            url = url.trim();
            setLoading(true);

            // Destroy existing HLS instance
            if (hls) {
                hls.destroy();
                hls = null;
            }

            // Reset video
            video.removeAttribute('src');
            video.load();

            // Detect if live
            isLive = url.includes('live') || url.includes('index.m3u8');

            // Check for native HLS support (Safari)
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    setLoading(false);
                    if (!isLive) {
                        timeDisplay.textContent = `0:00 / ${formatTime(video.duration)}`;
                    } else {
                        timeDisplay.textContent = 'Live 0:00';
                    }
                    video.play().catch(() => {});
                });
            } 
            // Use HLS.js
            else if (Hls.isSupported()) {
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: isLive,
                });

                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    setLoading(false);
                    video.play().catch(() => {});
                    if (!isLive) {
                        timeDisplay.textContent = `0:00 / ${formatTime(video.duration)}`;
                    } else {
                        timeDisplay.textContent = 'Live 0:00';
                        status.innerHTML = 'Live stream <span>🔴</span>';
                    }
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        setLoading(false);
                        status.innerHTML = 'Error loading stream <span>❌</span>';
                        console.error('HLS Error:', data);
                        alert('Failed to load stream. Please check the URL.');
                    }
                });

            } else {
                setLoading(false);
                alert('Your browser does not support HLS streaming.');
            }

            // Update status
            status.innerHTML = 'Loading... <span>⏳</span>';
        }

        // -------- Event Listeners --------
        video.addEventListener('timeupdate', updateProgress);

        video.addEventListener('play', () => {
            playBtn.textContent = '⏸';
            wrapper.classList.remove('paused');
        });

        video.addEventListener('pause', () => {
            playBtn.textContent = '▶';
            wrapper.classList.add('paused');
        });

        video.addEventListener('waiting', () => setLoading(true));
        video.addEventListener('canplay', () => setLoading(false));

        playBtn.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay);

        // Progress seek
        progress.addEventListener('input', (e) => {
            if (video.duration && !isLive) {
                const newTime = (e.target.value / 100) * video.duration;
                video.currentTime = newTime;
            }
        });

        // Volume
        volume.addEventListener('input', (e) => {
            video.volume = parseFloat(e.target.value);
            muteBtn.textContent = video.volume === 0 ? '🔇' : '🔊';
        });

        muteBtn.addEventListener('click', () => {
            if (video.volume > 0) {
                video.volume = 0;
                volume.value = 0;
                muteBtn.textContent = '🔇';
            } else {
                video.volume = 1;
                volume.value = 1;
                muteBtn.textContent = '🔊';
            }
        });

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen?.() ||
                document.documentElement.webkitRequestFullscreen?.();
            } else {
                document.exitFullscreen?.() || document.webkitExitFullscreen?.();
            }
        });

        // Load button
        loadBtn.addEventListener('click', () => loadStream(urlInput.value));

        // Enter key
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadStream(urlInput.value);
        });

        // Presets
        presets.forEach(btn => {
            btn.addEventListener('click', () => {
                const url = btn.dataset.url;
                urlInput.value = url;
                loadStream(url);
            });
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            }
            if (e.code === 'KeyF') {
                e.preventDefault();
                fullscreenBtn.click();
            }
        });

        // Auto-load initial stream
        setTimeout(() => loadStream(urlInput.value), 300);

        console.log('🎬 Simple M3U8 Player ready');
    })();
</script>

</body>
</html>
